version: 1.0

# Determines which values are valid and which are not.

templates:

  positive_uint16: &positive_uint16
    dtype: uint16
    validation:
      allow_negative: false
      allow_inf: false
      allow_nan: false
      minimum: 0
      maximum: 65535
      sentinel: []

  positive_uint32: &positive_uint32
    dtype: uint32
    validation:
      allow_negative: false
      allow_inf: false
      allow_nan: false
      minimum: 0
      maximum: null
      sentinel: []

  positive_uint64: &positive_uint64
    dtype: uint64
    validation:
      allow_negative: false
      allow_inf: false
      allow_nan: false
      minimum: 0
      maximum: null
      sentinel: []

  positive_float: &positive_float
    dtype: float64
    validation:
      allow_negative: false
      allow_inf: false
      allow_nan: true
      minimum: 0
      maximum: null
      sentinel: []

  packet_length: &packet_length
    dtype: float64
    validation:
      allow_negative: false
      allow_inf: false
      allow_nan: true
      minimum: 0
      maximum: 65535
      sentinel: []

  tcp_window: &tcp_window
    dtype: int32
    validation:
      allow_negative: false
      allow_inf: false
      allow_nan: false
      minimum: 0
      maximum: 65535
      sentinel: [-1]

feature_groups:

  packet_counts:
    template: *positive_uint32
    unit: packet
    features:
      - Total Fwd Packets
      - Total Backward Packets
      - Subflow Fwd Packets
      - Subflow Bwd Packets
      - act_data_pkt_fwd

  byte_counts:
    template: *positive_uint64
    unit: byte
    features:
      - Total Length of Fwd Packets
      - Total Length of Bwd Packets
      - Subflow Fwd Bytes
      - Subflow Bwd Bytes
      - Fwd Header Length
      - Bwd Header Length
      - Fwd Header Length.1

  iat_statistics:
    template: *positive_float
    unit: microsecond
    features:
      - Flow IAT Mean
      - Flow IAT Std
      - Fwd IAT Mean
      - Fwd IAT Std
      - Bwd IAT Mean
      - Bwd IAT Std
      - Active Mean
      - Active Std
      - Idle Mean
      - Idle Std

  iat_totals:
    template: *positive_uint64
    unit: microsecond
    features:
      - Flow Duration
      - Flow IAT Max
      - Flow IAT Min
      - Fwd IAT Total
      - Fwd IAT Max
      - Fwd IAT Min
      - Bwd IAT Total
      - Bwd IAT Max
      - Bwd IAT Min
      - Active Max
      - Active Min
      - Idle Max
      - Idle Min

  packet_lengths:
    template: *packet_length
    unit: byte
    features:
      - Fwd Packet Length Max
      - Fwd Packet Length Min
      - Fwd Packet Length Mean
      - Fwd Packet Length Std
      - Bwd Packet Length Max
      - Bwd Packet Length Min
      - Bwd Packet Length Mean
      - Bwd Packet Length Std
      - Min Packet Length
      - Max Packet Length
      - Packet Length Mean
      - Packet Length Std
      - Packet Length Variance
      - Average Packet Size
      - Avg Fwd Segment Size
      - Avg Bwd Segment Size

  rates:
    template: *positive_float
    unit: rate
    features:
      - Flow Bytes/s
      - Flow Packets/s
      - Fwd Packets/s
      - Bwd Packets/s
      - Fwd Avg Bytes/Bulk
      - Fwd Avg Packets/Bulk
      - Fwd Avg Bulk Rate
      - Bwd Avg Bytes/Bulk
      - Bwd Avg Packets/Bulk
      - Bwd Avg Bulk Rate
      - Down/Up Ratio

  tcp_windows:
    template: *tcp_window
    unit: byte
    features:
      - Init_Win_bytes_forward
      - Init_Win_bytes_backward
      - min_seg_size_forward

  tcp_flag_counts:
    template: *positive_uint32
    unit: count
    features:
      - Fwd PSH Flags
      - Bwd PSH Flags
      - Fwd URG Flags
      - Bwd URG Flags
      - FIN Flag Count
      - SYN Flag Count
      - RST Flag Count
      - PSH Flag Count
      - ACK Flag Count
      - URG Flag Count
      - CWE Flag Count
      - ECE Flag Count

features:

  Destination Port:
    <<: *positive_uint16
    unit: port

  Label:
    dtype: category
    unit: label
    validation: {}
